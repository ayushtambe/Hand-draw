<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
opacity:0; 
}

canvas{
position:absolute;
top:0;
left:0;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>

const video=document.getElementById("video")
const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let drawings=[]
let drawing=false
let lastX=0
let lastY=0

let smoothX=0
let smoothY=0

const connections=[
[0,1],[1,2],[2,3],[3,4],
[0,5],[5,6],[6,7],[7,8],
[5,9],[9,10],[10,11],[11,12],
[9,13],[13,14],[14,15],[15,16],
[13,17],[17,18],[18,19],[19,20],
[0,17]
]

function drawSkeleton(l){

ctx.strokeStyle="#00ccff"
ctx.lineWidth=4
ctx.shadowBlur=15
ctx.shadowColor="#00ccff"

for(let c of connections){

let a=l[c[0]]
let b=l[c[1]]

ctx.beginPath()
ctx.moveTo(a.x*canvas.width,a.y*canvas.height)
ctx.lineTo(b.x*canvas.width,b.y*canvas.height)
ctx.stroke()

}

}

function distance(a,b){

let dx=a.x-b.x
let dy=a.y-b.y
return Math.sqrt(dx*dx+dy*dy)

}

function isIndex(l){

return l[8].y<l[6].y &&
l[12].y>l[10].y &&
l[16].y>l[14].y &&
l[20].y>l[18].y

}

function isFist(l){

return l[8].y>l[6].y &&
l[12].y>l[10].y &&
l[16].y>l[14].y &&
l[20].y>l[18].y

}

function drawLine(x1,y1,x2,y2){

ctx.strokeStyle="#00ccff"
ctx.lineWidth=6
ctx.shadowBlur=20
ctx.shadowColor="#00ccff"

ctx.beginPath()
ctx.moveTo(x1,y1)
ctx.lineTo(x2,y2)
ctx.stroke()

drawings.push([x1,y1,x2,y2])

}

function redraw(){

for(let d of drawings){

ctx.beginPath()
ctx.moveTo(d[0],d[1])
ctx.lineTo(d[2],d[3])
ctx.stroke()

}

}

const hands=new Hands({
locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
})

hands.setOptions({
maxNumHands:1,
modelComplexity:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7
})

hands.onResults(results=>{

ctx.clearRect(0,0,canvas.width,canvas.height)

redraw()

if(results.multiHandLandmarks.length>0){

let l=results.multiHandLandmarks[0]

drawSkeleton(l)

let x=l[8].x*canvas.width
let y=l[8].y*canvas.height

smoothX=smoothX*0.7 + x*0.3
smoothY=smoothY*0.7 + y*0.3

if(isIndex(l)){

if(!drawing){
drawing=true
lastX=smoothX
lastY=smoothY
}

drawLine(lastX,lastY,smoothX,smoothY)

lastX=smoothX
lastY=smoothY

}else{
drawing=false
}

if(isFist(l)){

drawings=[]
ctx.clearRect(0,0,canvas.width,canvas.height)

}

}

})

async function startCamera(){

const stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
})

video.srcObject=stream

const camera=new Camera(video,{
onFrame:async()=>{
await hands.send({image:video})
},
width:640,
height:480
})

camera.start()

}

startCamera()

</script>

</body>
</html>
